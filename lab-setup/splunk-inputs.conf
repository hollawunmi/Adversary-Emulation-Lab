# Splunk Universal Forwarder — inputs.conf
# Place at: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# Restart forwarder after changes: Restart-Service SplunkForwarder

[WinEventLog://Security]
disabled = false
index = windows
renderXml = true
evt_resolve_ad_obj = true

[WinEventLog://System]
disabled = false
index = windows
renderXml = true

[WinEventLog://Application]
disabled = false
index = windows
renderXml = true

# Sysmon operational log — critical for TTP detection
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = windows
renderXml = true

# Windows Defender (useful for seeing what AV catches vs misses)
[WinEventLog://Microsoft-Windows-Windows Defender/Operational]
disabled = false
index = windows
renderXml = true

# PowerShell Script Block Logging
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = windows
renderXml = true

# Windows Remote Management (WinRM lateral movement detection)
[WinEventLog://Microsoft-Windows-WinRM/Operational]
disabled = false
index = windows
renderXml = true

# Task Scheduler (persistence detection)
[WinEventLog://Microsoft-Windows-TaskScheduler/Operational]
disabled = false
index = windows
renderXml = true
